<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Resource – DRM</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('drm-theme');
        if (!theme) {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/style.css?v=20260318" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">&#128218; Dev Resource Manager</a>
      <ul class="navbar-nav">
        <li><a href="/">Resources</a></li>
        <li><a href="/add.html">Add Resource</a></li>
        <li><button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme"></button></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <div class="form-card">
        <h1 style="margin-bottom: 24px;">Add New Resource</h1>

        <!-- Error Messages — shown by JS -->
        <div id="error-box" class="alert alert-danger" style="display:none;"></div>

        <form id="add-form" novalidate>

          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" placeholder="e.g., Striver's DSA Sheet" />
          </div>

          <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" placeholder="Describe this learning resource..."></textarea>
          </div>

          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category">
              <option value="">Select Category</option>
              <option value="DSA">DSA</option>
              <option value="Backend">Backend</option>
              <option value="DevOps">DevOps</option>
              <option value="AI">AI</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="form-group">
            <label for="difficulty">Difficulty *</label>
            <select id="difficulty">
              <option value="">Select Difficulty</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>

          <div class="form-group">
            <label for="link">Resource Link (optional if file is uploaded)</label>
            <input type="url" id="link" placeholder="https://example.com/resource" />
            <small>Add a web URL, upload a file, or provide both.</small>
          </div>

          <div class="form-group">
            <label for="resourceFile">Upload File (PDF, DOC, DOCX, EPUB, TXT)</label>
            <input type="file" id="resourceFile" accept=".pdf,.doc,.docx,.epub,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/epub+zip,text/plain" />
            <small>Maximum file size: 15MB.</small>
          </div>

          <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" placeholder="e.g., arrays, graphs, sorting" />
            <small>Separate tags with commas</small>
          </div>

          <div class="form-group">
            <label for="rating">Rating (0–5)</label>
            <select id="rating">
              <option value="0">0 - Not Rated</option>
              <option value="1">1 - Poor</option>
              <option value="2">2 - Fair</option>
              <option value="3">3 - Good</option>
              <option value="4">4 - Very Good</option>
              <option value="5">5 - Excellent</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary">Create Resource</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Developer Resource Manager &copy; 2026</p>
    </div>
  </footer>

  <script src="/js/theme.js?v=20260318"></script>
  <script src="/js/add.js"></script>
</body>
</html>
