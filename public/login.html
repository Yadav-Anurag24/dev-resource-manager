<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Dev Resource Manager</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('drm-theme');
        if (!theme) {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/style.css?v=20260318" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">&#128218; Dev Resource Manager</a>
      <ul class="navbar-nav">
        <li><a href="/">Resources</a></li>
        <li id="nav-add-resource"><a href="/add.html">Add Resource</a></li>
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme"></button></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <div class="form-card auth-card">
        <h1 style="margin-bottom: 8px;">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to manage your developer resources.</p>

        <!-- Error Messages -->
        <div id="error-box" class="alert alert-danger" style="display:none;"></div>

        <form id="login-form" novalidate>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%;">Login</button>
          </div>

          <p class="auth-switch">Don't have an account? <a href="/register.html">Register here</a></p>

        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>Developer Resource Manager &copy; 2026</p>
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/theme.js?v=20260318"></script>
  <script src="/js/login.js"></script>
</body>
</html>
